name: Deploy redirector audaza-links

on:
  push:
    branches: [main]
    paths:
      - 'links/redirector/**'
      - '.github/workflows/deploy-redirector.yml'
  workflow_dispatch:

jobs:
  # ════════ PATH-BASED (audaza.com/{l,g,b}/...) — funciona já ════════
  deploy-path-l:
    name: Sync → audaza.com/l/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./links/redirector/
          server-dir: /domains/audaza.com/public_html/l/
          state-name: .ftp-deploy-state-path-l.json
          exclude: |
            **/config.php
            **/config.example.php
            **/README.md
            **/.DS_Store

  deploy-path-g:
    name: Sync → audaza.com/g/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./links/redirector/
          server-dir: /domains/audaza.com/public_html/g/
          state-name: .ftp-deploy-state-path-g.json
          exclude: |
            **/config.php
            **/config.example.php
            **/README.md
            **/.DS_Store

  deploy-path-b:
    name: Sync → audaza.com/b/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./links/redirector/
          server-dir: /domains/audaza.com/public_html/b/
          state-name: .ftp-deploy-state-path-b.json
          exclude: |
            **/config.php
            **/config.example.php
            **/README.md
            **/.DS_Store

  # ════════ SUBDOMÍNIOS — só funcionam se você criar no hPanel ════════
  # As pastas FTP foram criadas pelo deploy anterior. Deixar os jobs aqui
  # mantém os arquivos sincronizados pra quando os subdomínios virem online.
  deploy-link:
    name: Sync → link.audaza.com (aguarda subdomínio)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./links/redirector/
          server-dir: /domains/link.audaza.com/public_html/
          state-name: .ftp-deploy-state-link.json
          exclude: |
            **/config.php
            **/config.example.php
            **/README.md
            **/.DS_Store

  deploy-go:
    name: Sync → go.audaza.com (aguarda subdomínio)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./links/redirector/
          server-dir: /domains/go.audaza.com/public_html/
          state-name: .ftp-deploy-state-go.json
          exclude: |
            **/config.php
            **/config.example.php
            **/README.md
            **/.DS_Store

  deploy-bio:
    name: Sync → bio.audaza.com (aguarda subdomínio)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./links/redirector/
          server-dir: /domains/bio.audaza.com/public_html/
          state-name: .ftp-deploy-state-bio.json
          dangerous-clean-slate: false
          exclude: |
            **/config.php
            **/config.example.php
            **/README.md
            **/.DS_Store
