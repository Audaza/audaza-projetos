name: Deploy redirector audaza-links

on:
  push:
    branches: [main]
    paths:
      - 'links/redirector/**'
      - '.github/workflows/deploy-redirector.yml'
  workflow_dispatch:

# Os subdomínios link./go./bio.audaza.com têm vhost no Hostinger apontando para:
#   /domains/audaza.com/public_html/{link,go,bio}/
# Por isso o deploy é nessas subpastas (NÃO em /domains/{sub}.audaza.com/).

jobs:
  deploy-link:
    name: Sync → link.audaza.com  (/audaza.com/public_html/link/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./links/redirector/
          server-dir: /domains/audaza.com/public_html/link/
          state-name: .ftp-deploy-state-link.json
          exclude: |
            **/config.php
            **/config.example.php
            **/README.md
            **/.DS_Store

  deploy-go:
    name: Sync → go.audaza.com  (/audaza.com/public_html/go/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./links/redirector/
          server-dir: /domains/audaza.com/public_html/go/
          state-name: .ftp-deploy-state-go.json
          exclude: |
            **/config.php
            **/config.example.php
            **/README.md
            **/.DS_Store

  deploy-bio:
    name: Sync → bio.audaza.com  (/audaza.com/public_html/bio/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: ./links/redirector/
          server-dir: /domains/audaza.com/public_html/bio/
          state-name: .ftp-deploy-state-bio.json
          dangerous-clean-slate: false
          exclude: |
            **/config.php
            **/config.example.php
            **/README.md
            **/.DS_Store
